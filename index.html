<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNC studio</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<!-- ICON -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* RESET */
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #ffffff;
  color: #111;
  text-align: center;
  overflow-x: hidden;
}

/* CONTAINER */
.container {
  max-width: 420px;
  margin: auto;
  padding: 60px 20px;
}

/* LOGO CINEMATIC */
.logo {
  width: 310px;
  margin-bottom: 20px;
  opacity: 0;
  transform: scale(0.9);
  animation: logoReveal 1s ease forwards;
}

/* TITLE */
h1 {
  font-size: 24px;
  letter-spacing: 4px;
  margin-bottom: 5px;
  opacity: 0;
  animation: fadeUp 1s ease forwards;
  animation-delay: 0.3s;
}

p {
  color: #666;
  font-size: 14px;
  margin-bottom: 40px;
  opacity: 0;
  animation: fadeUp 1s ease forwards;
  animation-delay: 0.5s;
}

/* LINK BUTTON */
.link {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #f5f5f5;
  color: #111;
  text-decoration: none;
  padding: 16px 20px;
  margin: 14px 0;
  border-radius: 16px;
  font-weight: 500;
  transition: all 0.3s ease;
  
  opacity: 0;
  transform: translateY(30px) scale(0.98);
  filter: blur(8px);
}

/* ICON LEFT */
.left {
  display: flex;
  align-items: center;
  gap: 12px;
}

/* HOVER */
.link:hover {
  background: #111;
  color: white;
  transform: scale(1.05);
}

/* STAGGER ANIMATION */
.link:nth-of-type(1) {
  animation: cardReveal 0.8s cubic-bezier(.2,.8,.2,1) forwards;
  animation-delay: 0.7s;
}
.link:nth-of-type(2) {
  animation: cardReveal 0.8s cubic-bezier(.2,.8,.2,1) forwards;
  animation-delay: 0.85s;
}
.link:nth-of-type(3) {
  animation: cardReveal 0.8s cubic-bezier(.2,.8,.2,1) forwards;
  animation-delay: 1s;
}
.link:nth-of-type(4) {
  animation: cardReveal 0.8s cubic-bezier(.2,.8,.2,1) forwards;
  animation-delay: 1.15s;
}

/* KEYFRAMES */
@keyframes logoReveal {
  to {
    opacity: 1;
    transform: scale(1);
  }
}

@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes cardReveal {
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
    filter: blur(0);
  }
}</style>
</head>

<body>

<div class="container">

  <!-- LOGO -->
  <img src="logo.jpeg" class="logo">

  <h1></h1>
  <p>Built for the street, designed for impact.</p>

  <!-- LINKS -->
  <a class="link" href="https://wa.me/6287748520674">
    <div class="left">
      <i class="fab fa-whatsapp"></i> Order via WhatsApp
    </div>
    <span class="arrow">→</span>
  </a>

  <a class="link" href="https://instagram.com/sncstudio.id">
    <div class="left">
      <i class="fab fa-instagram"></i> @sncstudio.id
    </div>
    <span class="arrow">→</span>
  </a>

  <a class="link" href="https://tiktok.com/@sncstudio.id">
    <div class="left">
      <i class="fab fa-tiktok"></i> @sncstudio.id
    </div>
    <span class="arrow">→</span>
  </a>

  <a class="link" href="https://shopee.co.id/sncstudio">
    <div class="left">
      <i class="fas fa-store"></i> Shopee
    </div>
    <span class="arrow">→</span>
  </a>

</div>

</body>
</html>
